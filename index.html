<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>LEXARA — Legal Intelligence Platform Chile</title>

    <!-- Favicon SVG -->
    <link rel="icon" type="image/svg+xml" href="/lexara-logo.svg" />
    <link rel="apple-touch-icon" href="/lexara-logo.svg" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#050814" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LEXARA" />

    <!-- SEO -->
    <meta name="description" content="LEXARA — Plataforma Legal Integral para el ejercicio del derecho en Chile. Análisis de contratos, seguimiento de causas, plazos fatales y más." />
    <meta name="keywords" content="abogados Chile, plataforma legal, análisis contratos, plazos procesales, gestión causas" />
    <meta name="author" content="LEXARA Legal Intelligence" />

    <!-- Open Graph -->
    <meta property="og:title" content="LEXARA — Legal Intelligence Platform" />
    <meta property="og:description" content="Plataforma legal integral para el ejercicio del derecho en Chile" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/lexara-logo.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />

    <style>
      * { -webkit-tap-highlight-color: transparent; }
      html { scroll-behavior: smooth; }
      body {
        margin: 0;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #050814;
        color: #f8fafc;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(99,102,241,0.25); border-radius: 99px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(99,102,241,0.45); }
      .font-mono { font-family: 'JetBrains Mono', 'Fira Code', monospace; }
      ::selection { background: rgba(99,102,241,0.3); color: #e2e8f0; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
