<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="50%" stop-color="#3730a3"/>
      <stop offset="100%" stop-color="#5b21b6"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="scaleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#c4b5fd"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1e3a8a" flood-opacity="0.6"/>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="200" height="200" rx="42" fill="url(#bg)" filter="url(#shadow)"/>
  <!-- Inner glow overlay -->
  <rect width="200" height="200" rx="42" fill="url(#glow)"/>
  <!-- Subtle border -->
  <rect x="1" y="1" width="198" height="198" rx="41" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="1.5"/>

  <!-- Abstract scale of justice - beam/balance bar -->
  <!-- Vertical pillar -->
  <rect x="98" y="52" width="4" height="90" rx="2" fill="url(#scaleGrad)" opacity="0.9"/>
  <!-- Top horizontal bar -->
  <rect x="58" y="52" width="84" height="5" rx="2.5" fill="url(#scaleGrad)"/>

  <!-- Left chain -->
  <line x1="72" y1="57" x2="68" y2="90" stroke="url(#scaleGrad)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Right chain -->
  <line x1="128" y1="57" x2="132" y2="85" stroke="url(#scaleGrad)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left pan (slightly lower - loaded) -->
  <ellipse cx="68" cy="97" rx="20" ry="5.5" fill="url(#scaleGrad)" opacity="0.85"/>
  <path d="M48 97 Q68 110 88 97" stroke="url(#scaleGrad)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Right pan (higher - lighter) -->
  <ellipse cx="132" cy="91" rx="20" ry="5.5" fill="url(#scaleGrad)" opacity="0.85"/>
  <path d="M112 91 Q132 104 152 91" stroke="url(#scaleGrad)" stroke-width="2" fill="none" opacity="0.6"/>

  <!-- Base -->
  <rect x="88" y="139" width="24" height="5" rx="2.5" fill="url(#scaleGrad)" opacity="0.7"/>
  <rect x="76" y="144" width="48" height="5" rx="2.5" fill="url(#scaleGrad)" opacity="0.5"/>

  <!-- "L" letter mark subtle overlay -->
  <rect x="82" y="158" width="36" height="3" rx="1.5" fill="rgba(165,180,252,0.3)"/>

  <!-- Glowing dot accent top-right -->
  <circle cx="157" cy="43" r="6" fill="#fbbf24" opacity="0.9"/>
  <circle cx="157" cy="43" r="3" fill="#ffffff" opacity="0.8"/>
  <circle cx="157" cy="43" r="10" fill="#fbbf24" opacity="0.15"/>
</svg>
