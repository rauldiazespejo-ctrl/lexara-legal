<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="lx-bg" x1="48" y1="40" x2="480" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="45%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
    <linearGradient id="lx-beam" x1="256" y1="96" x2="256" y2="416" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="lx-arc" x1="120" y1="120" x2="420" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <linearGradient id="lx-glass" x1="88" y1="88" x2="420" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>
    <filter id="lx-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="lx-clip">
      <rect width="512" height="512" rx="120" ry="120"/>
    </clipPath>
  </defs>

  <g clip-path="url(#lx-clip)">
    <rect width="512" height="512" rx="120" fill="url(#lx-bg)"/>
    <!-- Fine grid: legal structure / data -->
    <g opacity="0.11" stroke="#94a3b8" stroke-width="1">
      <path d="M0 128 H512 M0 256 H512 M0 384 H512 M128 0 V512 M256 0 V512 M384 0 V512"/>
    </g>
    <!-- Diagonal energy plane -->
    <path d="M-40 520 L520 -40 L520 520 Z" fill="url(#lx-glass)" opacity="0.9"/>
    <!-- Orbital arc -->
    <path d="M96 288 A160 160 0 0 1 416 288" stroke="url(#lx-arc)" stroke-width="10" stroke-linecap="round" fill="none" filter="url(#lx-glow)" opacity="0.95"/>
    <!-- Deconstructed balance: pillar -->
    <path d="M244 108 h24 v296 h-24z" fill="url(#lx-beam)" opacity="0.92"/>
    <!-- Top crossbeam -->
    <path d="M148 108 h216 a8 8 0 0 1 8 8v16a8 8 0 0 1-8 8H148a8 8 0 0 1-8-8v-16a8 8 0 0 1 8-8z" fill="url(#lx-beam)" opacity="0.88"/>
    <!-- Abstract L negative cut (right side) -->
    <path d="M320 172h112v220H320z" fill="#020617" opacity="0.55"/>
    <path d="M320 172 L432 172 L432 392 L352 392 L352 260 L320 260Z" fill="#0f172a" opacity="0.75"/>
    <!-- Floating pans / nodes -->
    <circle cx="168" cy="328" r="36" stroke="url(#lx-arc)" stroke-width="4" fill="rgba(15,23,42,0.85)"/>
    <circle cx="344" cy="296" r="28" stroke="url(#lx-beam)" stroke-width="3" fill="rgba(30,27,75,0.9)"/>
    <line x1="168" y1="140" x2="168" y2="292" stroke="url(#lx-beam)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <line x1="344" y1="140" x2="344" y2="268" stroke="url(#lx-beam)" stroke-width="3" stroke-linecap="round" opacity="0.55"/>
    <!-- Accent spark -->
    <circle cx="392" cy="120" r="10" fill="#fbbf24"/>
    <circle cx="392" cy="120" r="22" fill="#fbbf24" opacity="0.15"/>
    <!-- Rim -->
    <rect x="2" y="2" width="508" height="508" rx="118" stroke="url(#lx-arc)" stroke-opacity="0.35" stroke-width="3" fill="none"/>
  </g>
</svg>
